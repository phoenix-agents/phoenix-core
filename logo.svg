<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 火焰渐变 -->
    <linearGradient id="fireGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4500"/>
      <stop offset="30%" style="stop-color:#FF6B35"/>
      <stop offset="60%" style="stop-color:#F7931E"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>

    <!-- 金属光泽渐变 -->
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50"/>
      <stop offset="50%" style="stop-color:#34495E"/>
      <stop offset="100%" style="stop-color:#1A252F"/>
    </linearGradient>

    <!-- 光晕效果 -->
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0"/>
    </radialGradient>

    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景光晕 -->
  <circle cx="256" cy="256" r="240" fill="url(#glowGradient)"/>

  <!-- 外环 -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#fireGradient)" stroke-width="3" opacity="0.3"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#fireGradient)" stroke-width="2" opacity="0.2"/>

  <!-- Phoenix 主体 - 抽象凤凰造型 -->
  <g transform="translate(256,256)" filter="url(#shadow)">

    <!-- 左侧翅膀 - 火焰状 -->
    <path d="M -80 20
             Q -120 -20 -100 -60
             Q -60 -80 -40 -50
             Q -20 -70 0 -40
             Q 20 -70 40 -50
             Q 60 -80 100 -60
             Q 120 -20 80 20
             Q 60 40 40 30
             Q 20 50 0 40
             Q -20 50 -40 30
             Q -60 40 -80 20 Z"
          fill="url(#fireGradient)"/>

    <!-- 右侧翅膀 - 对称火焰状 -->
    <path d="M -80 20
             Q -120 -20 -100 -60
             Q -60 -80 -40 -50
             Q -20 -70 0 -40
             Q 20 -70 40 -50
             Q 60 -80 100 -60
             Q 120 -20 80 20
             Q 60 40 40 30
             Q 20 50 0 40
             Q -20 50 -40 30
             Q -60 40 -80 20 Z"
          fill="url(#fireGradient)"/>

    <!-- 中心身体 - 椭圆形 -->
    <ellipse cx="0" cy="10" rx="50" ry="70" fill="url(#fireGradient)"/>

    <!-- 头部 -->
    <circle cx="0" cy="-80" r="30" fill="url(#fireGradient)"/>

    <!-- 眼睛 - 左右各一 -->
    <circle cx="-12" cy="-85" r="8" fill="#FFFFFF"/>
    <circle cx="12" cy="-85" r="8" fill="#FFFFFF"/>
    <circle cx="-10" cy="-85" r="4" fill="#1A252F"/>
    <circle cx="10" cy="-85" r="4" fill="#1A252F"/>

    <!-- 鸟喙 -->
    <path d="M -15 -70 L 0 -60 L 15 -70 L 0 -65 Z" fill="#FFD700"/>

    <!-- 尾巴火焰 - 三簇 -->
    <path d="M -30 70
             Q -50 120 -30 150
             Q -10 130 -20 100
             Q 0 140 0 160
             Q 0 140 20 100
             Q 30 130 50 150
             Q 70 120 30 70
             Q 10 80 0 75
             Q -10 80 -30 70 Z"
          fill="url(#fireGradient)"/>

    <!-- 火焰装饰 - 周围小火焰 -->
    <circle cx="-100" cy="-100" r="15" fill="#FF6B35" opacity="0.6"/>
    <circle cx="100" cy="-100" r="12" fill="#F7931E" opacity="0.5"/>
    <circle cx="-120" cy="50" r="10" fill="#FF4500" opacity="0.4"/>
    <circle cx="120" cy="50" r="14" fill="#FFD700" opacity="0.5"/>
  </g>

  <!-- 底部文字 -->
  <g transform="translate(256,420)">
    <text x="0" y="0"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial"
          font-size="48"
          font-weight="700"
          fill="url(#fireGradient)"
          text-anchor="middle"
          letter-spacing="8">PHOENIX</text>
    <text x="0" y="35"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial"
          font-size="20"
          font-weight="400"
          fill="#7F8C8D"
          text-anchor="middle"
          letter-spacing="12">CORE</text>
  </g>
</svg>