  tracing: "logs/tracing/tracing.db"
  progress: "logs/progress/progress.db"
  audit: "logs/audit/audit.db"

features:
  memory: true
  tracing: true
  audit: true
  progress: true

api:
  host: "0.0.0.0"
  port: 8001
