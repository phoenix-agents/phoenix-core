# Phoenix Bot 意图路由配置

# 默认 Bot（当无法识别意图时）
default_bot: 小小谦

# 关键词映射表
# 按优先级排序，越靠前优先级越高
keyword_map:
  # 场控 - 直播间管理
  - keywords: ["直播间", "在线", "人数", "场控", "气氛", "灯光", "设备", "检查"]
    bot: 场控

  # 运营 - 数据分析
  - keywords: ["数据", "分析", "运营", "粉丝", "增长", "报告", "统计", "ROI", "转化率"]
    bot: 运营

  # 美工 - 设计
  - keywords: ["设计", "海报", "封面", "美工", "视觉", "图片", "Logo", "VI", "配色"]
    bot: 美工

  # 编导 - 内容策划
  - keywords: ["脚本", "策划", "编导", "内容", "创意", "主题", "议程", "话题"]
    bot: 编导

  # 剪辑 - 视频制作
  - keywords: ["剪辑", "视频", "切片", "高光", "集锦", "BGM", "特效", "成片"]
    bot: 剪辑

  # 客服 - 粉丝运营
  - keywords: ["粉丝", "客服", "问题", "反馈", "私信", "投诉", "建议", "用户"]
    bot: 客服

  # 渠道 - 分发
  - keywords: ["渠道", "分发", "平台", "推广", "合作", "商务", "投放", "引流"]
    bot: 渠道

# 自定义路由（可选，优先级最高）
# custom_routes:
#   - keywords: ["特殊关键词"]
#     bot: 特定 Bot
