<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix Security Center - 安全中心</title>
    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }

        h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-secure {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .status-warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .status-danger {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat {
            text-align: center;
            padding: 15px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }

        th {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        td {
            font-size: 14px;
        }

        .severity {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .severity-critical {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .severity-high {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .severity-medium {
            background: rgba(59, 130, 246, 0.2);
            color: var(--primary);
        }

        .severity-low {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .log-entry {
            padding: 10px;
            border-bottom: 1px solid #334155;
            font-size: 13px;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-time {
            color: var(--text-muted);
            font-size: 11px;
        }

        .log-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 8px;
        }

        .progress-bar {
            height: 8px;
            background: #334155;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), var(--warning), var(--danger));
            border-radius: 4px;
            transition: width 0.3s;
        }

        .alert-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .alert-title {
            color: var(--danger);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .settings-group {
            margin-bottom: 20px;
        }

        .settings-label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #0f172a;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .toggle-label {
            font-size: 13px;
        }

        .toggle-switch {
            width: 44px;
            height: 24px;
            background: #334155;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-switch.active {
            background: var(--success);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }

        .toggle-switch.active::after {
            transform: translateX(20px);
        }

        .tab-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .tab-btn {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .shield-icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                🛡️ Phoenix Security Center
                <span class="status-badge status-secure" id="overallStatus">安全运行中</span>
            </h1>
            <div>
                <button class="btn btn-primary" onclick="runPatrol()">立即巡查</button>
                <button class="btn btn-primary" onclick="exportReport()">导出报告</button>
            </div>
        </header>

        <!-- 警报区域 -->
        <div id="alertArea"></div>

        <!-- 统计卡片 -->
        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">🛡️ 安全状态</div>
                </div>
                <div class="shield-icon">🛡️</div>
                <div class="stat">
                    <div class="stat-value" id="securityScore">95</div>
                    <div class="stat-label">安全评分</div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 95%" id="securityProgress"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">🚫 已阻止威胁</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="blockedCount">0</div>
                    <div class="stat-label">24 小时内阻止</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">⚠️ 安全告警</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="alertCount">0</div>
                    <div class="stat-label">24 小时内告警</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">🔒 隔离区技能</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="quarantineCount">0</div>
                    <div class="stat-label">已隔离</div>
                </div>
            </div>
        </div>

        <!-- 选项卡 -->
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('overview')">概览</button>
            <button class="tab-btn" onclick="switchTab('events')">安全事件</button>
            <button class="tab-btn" onclick="switchTab('skills')">技能安检</button>
            <button class="tab-btn" onclick="switchTab('settings')">设置</button>
        </div>

        <!-- 概览 -->
        <div class="tab-content active" id="tab-overview">
            <div class="grid">
                <div class="card" style="grid-column: span 2;">
                    <div class="card-header">
                        <div class="card-title">📊 实时网络监控</div>
                    </div>
                    <table id="networkTable">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>目标</th>
                                <th>状态</th>
                                <th>原因</th>
                            </tr>
                        </thead>
                        <tbody id="networkLog">
                            <tr>
                                <td colspan="4" style="text-align: center; color: var(--text-muted);">暂无记录</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="card">
                    <div class="card-header">
                        <div class="card-title">🔐 防火墙状态</div>
                    </div>
                    <div class="settings-group">
                        <div class="toggle">
                            <span class="toggle-label">阻止所有出站连接</span>
                            <div class="toggle-switch" id="blockOutboundToggle" onclick="toggleBlockOutbound()"></div>
                        </div>
                        <div class="toggle">
                            <span class="toggle-label">自动隔离可疑技能</span>
                            <div class="toggle-switch active" id="autoIsolateToggle" onclick="toggleAutoIsolate()"></div>
                        </div>
                        <div class="toggle">
                            <span class="toggle-label">关键事件告警</span>
                            <div class="toggle-switch active" id="alertToggle" onclick="toggleAlerts()"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 安全事件 -->
        <div class="tab-content" id="tab-events">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">📋 事件日志</div>
                    <button class="btn btn-primary" onclick="refreshEvents()">刷新</button>
                </div>
                <div id="eventLog">
                    <div class="log-entry">
                        <span class="log-time">--</span>
                        <span>暂无事件记录</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 技能安检 -->
        <div class="tab-content" id="tab-skills">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">🔍 技能安全扫描</div>
                </div>
                <div style="margin-bottom: 15px;">
                    <input type="text" id="skillPathInput" placeholder="输入技能路径或选择文件"
                           style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;">
                </div>
                <button class="btn btn-primary" onclick="scanSkill()">扫描技能</button>
                <div id="scanResult" style="margin-top: 20px;"></div>
            </div>
        </div>

        <!-- 设置 -->
        <div class="tab-content" id="tab-settings">
            <div class="grid">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">🔐 安全策略</div>
                    </div>
                    <div class="settings-group">
                        <div class="settings-label">网络访问</div>
                        <div class="toggle">
                            <span class="toggle-label">阻止所有出站连接</span>
                            <div class="toggle-switch" id="settingBlockOutbound" onclick="toggleSetting('block_outbound')"></div>
                        </div>
                        <div class="toggle">
                            <span class="toggle-label">审计文件读取</span>
                            <div class="toggle-switch active" id="settingAuditFiles" onclick="toggleSetting('audit_files')"></div>
                        </div>
                        <div class="toggle">
                            <span class="toggle-label">审计网络调用</span>
                            <div class="toggle-switch active" id="settingAuditNetwork" onclick="toggleSetting('audit_network')"></div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <div class="card-title">🔄 定期巡查</div>
                    </div>
                    <div class="settings-group">
                        <div class="toggle">
                            <span class="toggle-label">启用巡查</span>
                            <div class="toggle-switch active" id="settingPatrolEnabled" onclick="toggleSetting('patrol_enabled')"></div>
                        </div>
                        <div style="padding: 12px; background: #0f172a; border-radius: 8px;">
                            <span class="toggle-label">巡查间隔：</span>
                            <select id="patrolInterval" style="background: #1e293b; color: white; padding: 4px 8px; border-radius: 4px; border: 1px solid #334155;">
                                <option value="15">15 分钟</option>
                                <option value="30">30 分钟</option>
                                <option value="60">1 小时</option>
                                <option value="180">3 小时</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <div class="card-title">🌐 网络白名单</div>
                    </div>
                    <div id="allowedDomains">
                        <div style="padding: 8px; background: #0f172a; border-radius: 4px; margin-bottom: 4px; font-size: 13px;">
                            ✓ api.anthropic.com
                        </div>
                        <div style="padding: 8px; background: #0f172a; border-radius: 4px; margin-bottom: 4px; font-size: 13px;">
                            ✓ api.openai.com
                        </div>
                        <div style="padding: 8px; background: #0f172a; border-radius: 4px; margin-bottom: 4px; font-size: 13px;">
                            ✓ localhost
                        </div>
                    </div>
                    <button class="btn btn-primary" style="margin-top: 10px;" onclick="addDomain()">+ 添加域名</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api/security';

        // 初始化
        async function init() {
            await loadStatus();
            await loadStats();
            await loadEvents();
            setInterval(loadStats, 30000); // 30 秒刷新
        }

        // 加载状态
        async function loadStatus() {
            try {
                const response = await fetch(`${API_BASE}/status`);
                const status = await response.json();

                document.getElementById('blockOutboundToggle').className =
                    'toggle-switch' + (status.block_all_outbound ? ' active' : '');
                document.getElementById('autoIsolateToggle').className =
                    'toggle-switch' + (status.auto_isolate ? ' active' : '');

                document.getElementById('quarantineCount').textContent =
                    status.quarantined_skills?.length || 0;
            } catch (e) {
                console.error('Failed to load status:', e);
            }
        }

        // 加载统计
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/report?hours=24`);
                const report = await response.json();

                document.getElementById('blockedCount').textContent = report.blocked_count || 0;
                document.getElementById('alertCount').textContent = report.alerts_count || 0;

                // 计算安全评分
                const score = calculateSecurityScore(report);
                document.getElementById('securityScore').textContent = score;
                document.getElementById('securityProgress').style.width = score + '%';

                // 更新状态
                updateStatusBadge(score);
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }

        // 计算安全评分
        function calculateSecurityScore(report) {
            let score = 100;
            score -= (report.blocked_count || 0) * 2;
            score -= (report.alerts_count || 0) * 5;
            score -= (report.quarantined_count || 0) * 10;
            return Math.max(0, Math.min(100, score));
        }

        // 更新状态徽章
        function updateStatusBadge(score) {
            const badge = document.getElementById('overallStatus');
            if (score >= 80) {
                badge.className = 'status-badge status-secure';
                badge.textContent = '安全运行中';
            } else if (score >= 50) {
                badge.className = 'status-badge status-warning';
                badge.textContent = '需要注意';
            } else {
                badge.className = 'status-badge status-danger';
                badge.textContent = '高风险';
            }
        }

        // 加载事件
        async function loadEvents() {
            try {
                const response = await fetch(`${API_BASE}/report?hours=24`);
                const report = await response.json();

                const eventLog = document.getElementById('eventLog');
                const events = report.recent_events || [];

                if (events.length === 0) {
                    eventLog.innerHTML = '<div class="log-entry">暂无事件记录</div>';
                } else {
                    eventLog.innerHTML = events.map(event => `
                        <div class="log-entry">
                            <span class="log-time">${new Date(event.timestamp).toLocaleString()}</span>
                            <span class="log-type" style="background: ${getEventTypeColor(event.type)}">${event.type}</span>
                            <span style="margin-left: 8px;">${event.message}</span>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error('Failed to load events:', e);
            }
        }

        function getEventTypeColor(type) {
            const colors = {
                'BLOCKED': 'var(--danger)',
                'ALERT': 'var(--warning)',
                'QUARANTINE': 'var(--danger)',
                'SKILL_SCAN': 'var(--primary)',
                'PATROL_COMPLETE': 'var(--success)',
            };
            return colors[type] || 'var(--text-muted)';
        }

        // 切换选项卡
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
        }

        // 立即巡查
        async function runPatrol() {
            try {
                await fetch(`${API_BASE}/patrol/run`, { method: 'POST' });
                alert('巡查已启动');
            } catch (e) {
                alert('巡查启动失败：' + e);
            }
        }

        // 导出报告
        async function exportReport() {
            try {
                const response = await fetch(`${API_BASE}/report/export`);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `security_report_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            } catch (e) {
                alert('导出失败：' + e);
            }
        }

        // 扫描技能
        async function scanSkill() {
            const path = document.getElementById('skillPathInput').value;
            if (!path) {
                alert('请输入技能路径');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/scan`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path })
                });
                const result = await response.json();

                const resultDiv = document.getElementById('scanResult');
                resultDiv.innerHTML = `
                    <div style="padding: 15px; background: ${result.verdict === 'PASS' ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)'};
                                 border-radius: 8px; border: 1px solid ${result.verdict === 'PASS' ? 'var(--success)' : 'var(--danger)'};">
                        <div style="font-size: 18px; font-weight: 600; margin-bottom: 10px;">
                            ${result.verdict === 'PASS' ? '✅ 安全检查通过' : '❌ 安全检查失败'}
                        </div>
                        <div>风险评分：<strong>${result.risk_score}/100</strong></div>
                        <div>发现问题：<strong>${result.total_findings}</strong></div>
                        ${result.findings_by_severity ? `
                        <div style="margin-top: 10px; font-size: 13px;">
                            严重：<span style="color: var(--danger)">${result.findings_by_severity.critical}</span> |
                            高危：<span style="color: var(--warning)">${result.findings_by_severity.high}</span> |
                            中危：<span style="color: var(--primary)">${result.findings_by_severity.medium}</span> |
                            低危：<span style="color: var(--success)">${result.findings_by_severity.low}</span>
                        </div>
                        ` : ''}
                    </div>
                `;
            } catch (e) {
                alert('扫描失败：' + e);
            }
        }

        // 切换设置
        async function toggleSetting(setting) {
            try {
                await fetch(`${API_BASE}/settings/${setting}`, { method: 'POST' });
                loadStatus();
            } catch (e) {
                console.error('Failed to toggle setting:', e);
            }
        }

        async function toggleBlockOutbound() {
            await fetch(`${API_BASE}/block-outbound`, { method: 'POST' });
            loadStatus();
        }

        async function toggleAutoIsolate() {
            await fetch(`${API_BASE}/settings/auto_isolate`, { method: 'POST' });
            loadStatus();
        }

        async function toggleAlerts() {
            await fetch(`${API_BASE}/settings/alert_on_critical`, { method: 'POST' });
            loadStatus();
        }

        function refreshEvents() {
            loadEvents();
        }

        function addDomain() {
            const domain = prompt('输入要允许域名:');
            if (domain) {
                // TODO: 调用 API 添加域名
                alert('域名添加功能开发中...');
            }
        }

        // 启动
        init();
    </script>
</body>
</html>
